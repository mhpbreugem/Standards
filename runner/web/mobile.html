<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>MIWN runner</title>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<style>
  :root {
    --bg:#111; --fg:#ccc; --muted:#666;
    --done:#2a9a30; --ready:#3a8ef7; --claimed:#c99000;
    --bailed:#d03010; --blocked:#555; --skip:#444;
    --hdr:#202020; --rowalt:#161616; --border:#252525;
  }
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin:0; padding:0; overflow-x:hidden; max-width:100vw; width:100%; }
  body {
    font-family: ui-monospace, 'Menlo', monospace;
    font-size: 7.6px;
    line-height: 1.25;
    background: var(--bg);
    color: var(--fg);
  }

  /* ── top bar ── */
  #bar {
    position: sticky; top:0; z-index:20;
    background: #1a1a1a; border-bottom: 1px solid #333;
    padding: 2px 3px;
    display: flex; flex-wrap: nowrap; gap: 2px; align-items: center;
    overflow: hidden; max-width: 100vw;
  }
  #brand { font-size: 9.5px; font-weight: 900; color: #fff; letter-spacing: 0.5px; flex-shrink:0; }
  .btn {
    font-family: inherit; font-size: 9.5px; font-weight: 700;
    border: none; border-radius: 2px; padding: 3px 0;
    width: 22px; text-align: center;
    cursor: pointer; color: #fff; white-space: nowrap; flex-shrink:0;
    background:#333;
  }
  .b-go   { background:#1a5e2a; }
  .b-kill { background:#5e1a1a; }
  .nlabel { font-size:7px; color:#888; flex-shrink:0; margin-left:2px; }
  #nworkers {
    font-family: inherit; font-weight: 900; font-size: 13px; color: #fff;
    background:#1e1e1e; border:1px solid #2a7adf; border-radius:2px;
    width:30px; text-align:center; padding:1px 0; flex-shrink:0;
  }
  #pat-input {
    font-family: inherit; font-size: 9.5px;
    background: #1e1e1e; color: #bbb; border: 1px solid #444;
    border-radius: 2px; padding: 1px 3px;
    width: min(80px,20vw); min-width:0; flex-shrink:1;
  }
  #meta-right { margin-left:auto; font-size:7px; color:var(--muted); white-space:nowrap; flex-shrink:1; min-width:0; }
  #status-msg { font-size:8.5px; color:var(--claimed); white-space:nowrap; flex-shrink:0; }

  /* ── collapsible sections ── */
  .sec-hdr {
    display: flex; align-items: center; gap: 3px;
    padding: 2px 3px; cursor: pointer;
    background: #161616; border-bottom: 1px solid #222;
    user-select: none;
  }
  .sec-hdr:hover { background: #1c1c1c; }
  .chev { font-size: 7px; color: #555; width: 8px; flex-shrink:0; line-height:1; }
  .sec-label { font-size: 8px; font-weight: 700; color: #777; flex-shrink:0; margin-right:2px; }
  .sec-body.collapsed { display: none; }

  /* ── summary pills ── */
  #pills { display:flex; flex-wrap:nowrap; gap:2px; align-items:center; flex:1; min-width:0; overflow:hidden; }
  .pill {
    font-size:8px; font-weight:700; padding:1px 5px;
    border-radius:2px; cursor:pointer; color:#fff; white-space:nowrap; flex-shrink:0;
  }
  .pill.done    { background:var(--done); }
  .pill.ready   { background:var(--ready); }
  .pill.claimed { background:var(--claimed); }
  .pill.blocked { background:var(--blocked); }
  .pill.bailed  { background:var(--bailed); }
  .pill.skip    { background:var(--skip); }
  .pill.total   { background:#2a2a2a; padding:1px 3px; }

  /* ── filter bar ── */
  #filterbar {
    padding: 2px 3px; border-bottom:1px solid #1a1a1a;
    display:flex; gap:2px; align-items:center;
  }
  #filter {
    font-family:inherit; font-size:10.1px;
    background:#1e1e1e; color:#ccc; border:1px solid #333;
    border-radius:2px; padding:1px 3px; flex:1; min-width:0;
  }

  /* ── sweep section ── */
  #sweep-meta { font-size:7.5px; color:#555; padding:2px 3px 3px; }
  .sw-tbl { width:100%; border-collapse:collapse; }
  .sw-tbl th, .sw-tbl td { font-size:8px; padding:1px 4px; text-align:right; }
  .sw-tbl th { color:#666; font-weight:400; border-bottom:1px solid #2a2a2a; }
  .sw-tbl td:first-child, .sw-tbl th:first-child { text-align:left; }
  .sw-tbl tr:nth-child(even) td { background:#151515; }
  .sw-r2-good { color:var(--done); }
  .sw-r2-mid  { color:var(--claimed); }
  .sw-r2-high { color:var(--bailed); }
  #sweep-body { padding: 0 3px 4px; }

  /* ── footer ── */
  #footer { font-size:7px; color:#444; text-align:center; padding:6px 0 4px; border-top:1px solid #1e1e1e; margin-top:4px; }

  /* ── tasks table ── */
  table { border-collapse:collapse; table-layout:fixed; width:100%; max-width:100%; font-size:7.6px; }
  colgroup col { overflow:hidden; }
  th, td { padding:0 2px; border-bottom:1px solid var(--border); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; line-height:1.3; min-width:0; }
  th { background:var(--hdr); font-weight:700; font-size:5.3px; color:#888; cursor:pointer; text-align:left; height:9px; }
  th:hover { background:#2a2a2a; }
  tr:nth-child(even) td { background:var(--rowalt); }
  td { height:12px; }
  .st-done    { color:var(--done);    font-weight:700; }
  .st-ready   { color:var(--ready);   font-weight:700; }
  .st-claimed { color:var(--claimed); font-weight:700; }
  .st-blocked { color:var(--blocked); }
  .st-bailed  { color:var(--bailed);  font-weight:700; }
  .st-skip    { color:var(--skip); }
  .enorm  { color:var(--done); }
  .muted  { color:var(--muted); }
  .err    { color:var(--bailed); }
  .dim    { color:#888; }
  .stage-a { color:#b08000; font-weight:700; }
  .stage-n { color:#2a7adf; font-weight:700; }
  tr.row-claimed td { background:#1a1200 !important; }
  tr:hover td { filter:brightness(1.25); }
</style>
</head>
<body>

<div id="bar">
  <span id="brand">MIWN</span>
  <span class="nlabel">N</span><input id="nworkers" type="number" min="0" max="16"
    onchange="setWorkers(this.value)" title="target permanent workers (writes runner.config.json)">
  <button class="btn b-go"   onclick="bumpWorkers(1)"  title="add a permanent worker (N+1)">+1</button>
  <button class="btn"        onclick="bumpWorkers(-1)" title="remove one (N-1)">&minus;1</button>
  <button class="btn b-kill" onclick="stopAll()" title="stop all: N=0 + cancel runs">&#x2715;&#x2715;</button>
  <button class="btn"        onclick="resetBailed()">&#x21BA;</button>
  <button class="btn"        onclick="downloadAll()">&#x2B07;</button>
  <button class="btn"        onclick="loadAll()">&#x27F3;</button>
  <span id="meta-right"><span id="site-mod"></span></span>
  <span id="status-msg"></span>
</div>

<!-- ── TASKS section ── -->
<div class="sec-hdr" onclick="toggleSection('tasks')">
  <span class="chev" id="chev-tasks">&#x25BE;</span>
  <span class="sec-label">tasks</span>
  <div id="pills"></div>
  <input type="password" id="pat-input" placeholder="PAT" oninput="savePat()" onclick="event.stopPropagation()">
</div>
<div class="sec-body" id="sec-tasks">
  <div id="filterbar">
    <input type="text" id="filter" placeholder="filter…" oninput="renderTasks()">
  </div>
  <table>
    <colgroup>
      <col style="width:8%">
      <col style="width:8%">
      <col style="width:7%">
      <col style="width:7%">
      <col style="width:7%">
      <col style="width:9%">
      <col style="width:8%">
      <col style="width:8%">
      <col style="width:10%">
      <col style="width:7%">
      <col style="width:7%">
      <col style="width:9%">
      <col style="width:5%">
    </colgroup>
    <thead><tr>
      <th onclick="sortBy('id')">id</th>
      <th onclick="sortBy('status')">st</th>
      <th class="dim">K&#xB7;G</th>
      <th class="dim" onclick="sortBy('gamma')">&#x3B3;</th>
      <th class="dim" onclick="sortBy('tau')">&#x3C4;</th>
      <th onclick="sortBy('F_max')">F@50</th>
      <th>F&#x208B;&#x2081;</th>
      <th>1-R&#xB2;</th><th>Vi</th><th>TV</th>
      <th>stg</th>
      <th onclick="sortBy('completed_at')">time</th>
      <th>last</th>
    </tr></thead>
    <tbody id="task-body"></tbody>
  </table>
</div>

<!-- ── SWEEP section ── -->
<div class="sec-hdr" onclick="toggleSection('sweep')">
  <span class="chev" id="chev-sweep">&#x25BE;</span>
  <span class="sec-label">sweep</span>
  <span id="sweep-meta"></span>
</div>
<div class="sec-body" id="sec-sweep">
  <div id="sweep-body"></div>
</div>

<script>
  const OWNER="mhpbreugem", REPO="MIWN", BRANCH="main", PROJECT="MIWN";
  let taskData=null, progressData={};
  let sortCol="id", sortAsc=true;
  let taskMap=new Map();

  function getPat(){return localStorage.getItem('fpf_pat')||'';}
  function savePat(){const v=document.getElementById('pat-input').value.trim();v?localStorage.setItem('fpf_pat',v):localStorage.removeItem('fpf_pat');}
  window.addEventListener('DOMContentLoaded',()=>{const p=getPat();if(p)document.getElementById('pat-input').value=p;loadWorkers();});

  function setMsg(t,ms=0){const e=document.getElementById('status-msg');e.textContent=t;if(ms)setTimeout(()=>e.textContent='',ms);}

  // ── section toggle ────────────────────────────────────────────────────────
  const _open={tasks:true,sweep:true};
  (()=>{try{Object.assign(_open,JSON.parse(localStorage.getItem('fpf_sec')||'{}'));}catch{}})();

  function toggleSection(name){
    _open[name]=!_open[name];
    document.getElementById('sec-'+name).classList.toggle('collapsed',!_open[name]);
    document.getElementById('chev-'+name).innerHTML=_open[name]?'&#x25BE;':'&#x25B8;';
    if(name==='sweep'&&_open[name]&&!_sweepLoaded){loadSweep();_sweepLoaded=true;}
    try{localStorage.setItem('fpf_sec',JSON.stringify(_open));}catch{}
  }

  // apply persisted state on load
  window.addEventListener('DOMContentLoaded',()=>{
    ['tasks','sweep'].forEach(name=>{
      if(!_open[name]){
        document.getElementById('sec-'+name).classList.add('collapsed');
        document.getElementById('chev-'+name).innerHTML='&#x25B8;';
      }
    });
  });

  // ── action buttons ────────────────────────────────────────────────────────
  // Kick a run now (uses N from config). The schedule also runs it automatically.
  async function dispatchRun(){
    const pat=getPat();if(!pat){setMsg('PAT required',3000);return false;}
    try{
      const res=await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/actions/workflows/solve.yml/dispatches`,
        {method:'POST',headers:{Authorization:`token ${pat}`,'Content-Type':'application/json'},
         body:JSON.stringify({ref:BRANCH})});
      if(!res.ok)throw new Error(res.status);
      return true;
    }catch(e){setMsg(`✗ dispatch ${e.message}`,4000);return false;}
  }

  // +1 / -1: change the permanent target N (and kick a run so it applies promptly).
  async function bumpWorkers(d){
    const el=document.getElementById('nworkers');
    const cur=parseInt(el && el.value,10); const base=Number.isFinite(cur)?cur:2;
    const ok=await setWorkers(base+d);
    if(ok) await dispatchRun();
  }

  // N = target number of workers always running. Reads/writes runner.config.json.
  async function loadWorkers(){
    try{
      const cfg=await apiContent('todo/runner.config.json');
      const el=document.getElementById('nworkers');
      if(el&&document.activeElement!==el) el.value=(cfg.workers??2);
    }catch(e){}
  }
  async function setWorkers(v){
    const n=Math.max(0,Math.min(16,parseInt(v,10)||0));
    const pat=getPat();if(!pat){setMsg('PAT required for N',3000);return false;}
    setMsg('setting N…');
    try{
      const path='todo/runner.config.json';
      const meta=await fj(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${path}?ref=${BRANCH}`);
      const cfg=JSON.parse(decB64(meta.content));
      cfg.workers=n;
      const body=JSON.stringify({message:`set workers=${n}`,content:encB64(JSON.stringify(cfg,null,2)+'\n'),sha:meta.sha,branch:BRANCH});
      const r=await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${path}`,
        {method:'PUT',headers:{Authorization:`token ${pat}`,'Content-Type':'application/json'},body});
      if(!r.ok)throw new Error(await r.text());
      document.getElementById('nworkers').value=n;
      setMsg(`✓ N=${n} permanent workers`,3000);
      return true;
    }catch(e){setMsg(`✗ ${e.message}`,5000);return false;}
  }

  async function cancelRuns(){
    const pat=getPat();if(!pat)return 0;
    const runs=await fj(`https://api.github.com/repos/${OWNER}/${REPO}/actions/runs?status=in_progress&per_page=50`);
    const active=(runs.workflow_runs||[]);
    await Promise.all(active.map(r=>fetch(
      `https://api.github.com/repos/${OWNER}/${REPO}/actions/runs/${r.id}/cancel`,
      {method:'POST',headers:{Authorization:`token ${pat}`}})));
    return active.length;
  }

  // Stop the pool: set N=0 (so nothing refills) and cancel any in-progress runs.
  async function stopAll(){
    if(!confirm('Stop all workers? Sets N=0 and cancels running jobs.'))return;
    const pat=getPat();if(!pat){setMsg('PAT required',3000);return;}
    setMsg('stopping…');
    try{
      await setWorkers(0);
      const k=await cancelRuns();
      setMsg(`✓ N=0, cancelled ${k} run(s)`,4000);
    }catch(e){setMsg(`✗ ${e.message}`,4000);}
  }

  async function resetBailed(){
    const pat=getPat();if(!pat){setMsg('PAT required',3000);return;}
    setMsg('resetting bailed…');
    try{
      const qpath=`todo/TASK_QUEUE.json`;
      const meta=await fj(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${qpath}?ref=${BRANCH}`);
      const q=JSON.parse(decB64(meta.content));
      let n=0;
      const cutoff=Date.now()-15*60*1000;   // claims older than 15 min are orphaned (solve cap ~10 min)
      (q.tasks||[]).forEach(t=>{
        if(t.status==='bailed'||t.status==='skip'){t.status='ready';delete t.result;n++;}
        else if(t.status==='claimed'&&t.claimed_at&&new Date(t.claimed_at).getTime()<cutoff){
          t.status='ready';delete t.claimed_by;delete t.claimed_at;n++;}
      });
      if(!n){setMsg('nothing to reset (no bailed/skip/stale)',3000);return;}
      q.updated_at=new Date().toISOString();
      const body=JSON.stringify({message:`reset ${n} bailed/skip/stale -> ready`,content:encB64(JSON.stringify(q,null,2)+'\n'),sha:meta.sha,branch:BRANCH});
      const r=await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${qpath}`,
        {method:'PUT',headers:{Authorization:`token ${pat}`,'Content-Type':'application/json'},body});
      if(!r.ok)throw new Error(await r.text());
      setMsg(`✓ reset ${n} bailed → ready`,4000);
      await loadAll();
    }catch(e){setMsg(`✗ ${e.message}`,5000);}
  }

  // ── fetch helpers ─────────────────────────────────────────────────────────
  function rawUrl(p){return`https://raw.githubusercontent.com/${OWNER}/${REPO}/${BRANCH}/${p}`;}
  function apiUrl(p){return`https://api.github.com/repos/${OWNER}/${REPO}/contents/${p}?ref=${BRANCH}`;}
  function authH(){const p=getPat();return p?{Authorization:`token ${p}`}:{};}
  async function fj(url){const r=await fetch(url,{cache:"no-store",headers:authH()});if(!r.ok)throw new Error(r.status);return r.json();}
  function encB64(s){const u=new TextEncoder().encode(s);let b='';for(let i=0;i<u.length;i+=0x8000)b+=String.fromCharCode.apply(null,u.subarray(i,i+0x8000));return btoa(b);}
  function decB64(x){const bin=atob(String(x).replace(/\n/g,''));return new TextDecoder().decode(Uint8Array.from(bin,c=>c.charCodeAt(0)));}
  async function apiContent(path){const m=await fj(apiUrl(path));if(m.content)return JSON.parse(decB64(m.content));return fj(rawUrl(path));}

  function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}

  // ── formatting helpers ────────────────────────────────────────────────────
  const _sidCache=new Map();
  function shortId(id){
    if(_sidCache.has(id))return _sidCache.get(id);
    const s=id.replace(/^g0*(\d+)_t0*(\d+)$/,(_,g,t)=>`g${g}t${t}`).slice(0,12);
    _sidCache.set(id,s);return s;
  }
  function sig3(v){return v!=null?parseFloat(Number(v).toPrecision(3)):null;}
  function sig4(v){return v!=null?parseFloat(Number(v).toPrecision(4)):null;}
  function fmtF(v){if(v==null)return"—";return Number(v).toExponential(0);}
  function fmtR2(v){if(v==null)return"—";return Number(v).toFixed(4).replace(/^0/,"");}
  function fmtSig3(v){const n=sig3(v);return n!=null?String(n):"—";}
  function fmtDate(iso){const d=new Date(iso);return`${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;}

  function stageStr(pr){
    if(!pr)return'';
    const p=(pr.extra||{}).phase||null, it=pr.iter??'';
    if(p==="mp_newton"||p==="newton") return`<span class="stage-n">N${it}</span>`;
    if(p==="anderson")                return`<span class="stage-a">A${it}</span>`;
    if(p==="picard")                  return`<span class="stage-a">P${it}</span>`;
    return it!==''?`i${it}`:'';
  }

  function fmtKG(t){
    if(!t)return'';
    const K=t.K??t.solver_params?.K??3;
    const G=t.G??t.solver_params?.G??t.solver_params?.G_inner??16;
    return`<span class="dim">${K}&#xB7;${typeof G==='number'?String(G).padStart(2,'0'):G}</span>`;
  }

  function fmtLast(iso){
    if(!iso)return'';
    const s=(Date.now()-new Date(iso).getTime())/1000;
    return s<60?`${Math.floor(s)}s`:s<3600?`${Math.floor(s/60)}m`:`${(s/3600).toFixed(1)}h`;
  }

  function fmtTime(t,pr){
    if(t.completed_at)return fmtDate(t.completed_at);
    const iso=t.claimed_at||pr?.started_at;
    if(iso){const s=(Date.now()-new Date(iso).getTime())/1000;return s<3600?`${Math.floor(s/60)}m`:`${(s/3600).toFixed(1)}h`;}
    return'';
  }

  // ── task loading ──────────────────────────────────────────────────────────
  let _qSha=null;
  async function loadTasks(){
    if(getPat()){
      const m=await fj(apiUrl(`todo/TASK_QUEUE.json`));
      if(m.sha===_qSha)return;
      _qSha=m.sha;
      taskData=JSON.parse(decB64(m.content));
    }else{
      taskData=await fj(rawUrl(`todo/TASK_QUEUE.json`));
    }
    taskMap=new Map((taskData.tasks||[]).map(t=>[t.id,t]));
    renderTasks();
    loadProgress().catch(()=>{});
    const sm=document.getElementById("site-mod");
    if(sm&&taskData.updated_at){
      const d=new Date(taskData.updated_at);
      sm.textContent=`${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
    }
  }

  function getDS(t){
    const pr=progressData[t.id];
    const fresh=pr&&pr.last_update&&(Date.now()-new Date(pr.last_update).getTime())<5400000;
    if(fresh&&(t.status==="ready"||t.status==="bailed"))return"claimed";
    return t.status;
  }

  const ST2={done:"done",ready:"ready",claimed:"claim",blocked:"block",bailed:"bailed",skip:"skip"};

  // claimed tasks show which worker holds them, e.g. "@2" (from claude-2-<runid>)
  function workerTag(t,pr){
    const w=(t&&t.claimed_by)||(pr&&pr.worker_id)||"";
    const m=w.match(/(?:claude-)?(\d+)/);
    return m?("@"+m[1]):(w?("@"+w.slice(0,4)):"@?");
  }

  function renderTasks(){
    if(!taskData)return;
    const tasks=taskData.tasks||[];
    const fv=(document.getElementById("filter")?.value||"").toLowerCase();
    const dsMap=new Map(tasks.map(t=>[t.id,getDS(t)]));

    const counts={};
    tasks.forEach(t=>{const ds=dsMap.get(t.id);counts[ds]=(counts[ds]||0)+1;});
    const order=["done","claimed","ready","blocked","bailed","skip"];
    document.getElementById("pills").innerHTML=
      order.filter(s=>counts[s]).map(s=>{
        const sel=fv===s?' style="outline:2px solid #fff"':'';
        return`<span class="pill ${s}"${sel} onclick="(function(){var f=document.getElementById('filter');f.value=f.value.toLowerCase()==='${s}'?'':'${s}';renderTasks();})()">${s[0]}:${counts[s]}</span>`;
      }).join("")+`<span class="pill total">#${tasks.length}</span>`;

    const filtered=tasks.filter(t=>{
      const ds=dsMap.get(t.id);
      if(ds==="blocked"&&!fv)return false;
      if(!fv)return true;
      // match id, status (raw + display), the worker that holds it (claimed_by /
      // "@N" tag — the relabeled st column), and the grid coords.
      return t.id.toLowerCase().includes(fv)||ds.toLowerCase().includes(fv)||
             String(t.status||"").toLowerCase().includes(fv)||
             String(t.claimed_by||"").toLowerCase().includes(fv)||
             workerTag(t,progressData[t.id]).toLowerCase().includes(fv)||
             String(t.gamma||"").includes(fv)||String(t.tau||"").includes(fv);
    });
    const sorted=[...filtered].sort((a,b)=>{
      let av=a[sortCol]??a.result?.[sortCol]??"";
      let bv=b[sortCol]??b.result?.[sortCol]??"";
      if(typeof av==="number"&&typeof bv==="number")return sortAsc?av-bv:bv-av;
      return sortAsc?String(av).localeCompare(String(bv)):String(bv).localeCompare(String(av));
    });

    document.getElementById("task-body").innerHTML=sorted.map(t=>{
      const pr=progressData[t.id];
      const ds=dsMap.get(t.id);
      const isCl=ds==="claimed";
      const r=t.result||{};
      const fmaxDone=r.F_max!=null?fmtF(r.F_max):r.F_max_bound!=null?`&lt;${fmtF(r.F_max_bound)}`:"";
      const fStr=isCl?(pr?.ftol!=null?fmtF(pr.ftol):""):fmaxDone;
      const rc=isCl?' class="row-claimed"':'';
      const hist=pr?.ftol_history||[];
      const fPrev=isCl&&hist.length>=2?fmtF(hist[hist.length-2]):"";
      return`<tr${rc}>
        <td>${esc(shortId(t.id))}</td>
        <td class="st-${ds}">${ds==="claimed"?workerTag(t,pr):(ST2[ds]||ds.slice(0,4))}</td>
        <td>${fmtKG(t)}</td>
        <td class="dim">${sig4(t.gamma)??""}</td>
        <td class="dim">${sig4(t.tau)??""}</td>
        <td class="enorm">${fStr}</td>
        <td class="muted">${fPrev}</td>
        <td>${ds==="done"?fmtR2(r["1-R2"]):""}</td>
        <td class="muted">${ds==="done"&&r.Vi!=null?Number(r.Vi).toFixed(2):"—"}</td>
        <td class="muted">${ds==="done"?fmtSig3(r.TV):""}</td>
        <td>${isCl?stageStr(pr):""}</td>
        <td class="muted">${fmtTime(t,pr)}</td>
        <td class="muted">${isCl?fmtLast(pr?.last_update):""}</td>
      </tr>`;
    }).join("");
  }

  function sortBy(col){if(sortCol===col)sortAsc=!sortAsc;else{sortCol=col;sortAsc=true;}renderTasks();}

  const _prevFtol={};
  async function loadProgress(){
    if(!taskData)return;
    const claimed=taskData.tasks.filter(t=>t.status==="claimed");
    const claimedIds=new Set(claimed.map(t=>t.id));
    for(const id of Object.keys(progressData)){if(!claimedIds.has(id))delete progressData[id];}
    await Promise.all(claimed.map(async t=>{
      const path=`todo/progress/${t.id}.json`;
      try{
        const d=getPat()?await apiContent(path):await fj(rawUrl(path));
        if(progressData[t.id]?.ftol!=null)_prevFtol[t.id]=progressData[t.id].ftol;
        progressData[t.id]=d;
      }catch(e){if(String(e.message)==='404')delete progressData[t.id];}
    }));
    renderTasks();
  }

  function taskById(id){return taskMap.get(id)||null;}

  async function downloadAll(){
    if(!taskData){alert('Load tasks first');return;}
    const eligible=(taskData.tasks||[]).filter(t=>
      t.status==="done"&&!t.test&&t.checkpoint&&Number(t.result?.F_max)<1e-50);
    if(!eligible.length){setMsg('No emin100 solutions yet',3000);return;}
    setMsg('Loading JSZip…');
    if(!window.JSZip){
      await new Promise((res,rej)=>{
        const s=document.createElement('script');
        s.src='https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js';
        s.onload=res;s.onerror=()=>rej(new Error('JSZip load failed'));
        document.head.appendChild(s);
      });
    }
    const zip=new JSZip();
    zip.file('metadata.json',JSON.stringify(eligible.map(t=>({
      id:t.id,gamma:t.gamma,tau:t.tau,G:t.G,K:t.K,
      result:t.result,completed_at:t.completed_at,checkpoint:t.checkpoint
    })),null,2));
    let n=0;
    setMsg(`Fetching 0/${eligible.length}…`);
    await Promise.all(eligible.map(async t=>{
      try{
        const r=await fetch(`https://raw.githubusercontent.com/${OWNER}/${REPO}/${BRANCH}/${t.checkpoint}`,{headers:authH()});
        if(!r.ok)return;
        zip.file(t.checkpoint.split('/').pop(),await r.arrayBuffer());
        setMsg(`Fetching ${++n}/${eligible.length}…`);
      }catch{}
    }));
    setMsg('Zipping…');
    const blob=await zip.generateAsync({type:'blob',compression:'STORE'});
    const a=document.createElement('a');
    a.href=URL.createObjectURL(blob);
    a.download=`REZN_emin100_${new Date().toISOString().slice(0,10)}.zip`;
    a.click();URL.revokeObjectURL(a.href);
    setMsg(`✓ ${n}/${eligible.length} files + metadata.json`,5000);
  }

  // ── poll loops ────────────────────────────────────────────────────────────
  const POLL_MS=120000, PROGRESS_MS=60000;
  let _lp=null,_lq=null,_initTime=Date.now();
  async function pollProgress(){try{await loadProgress();_lp=Date.now();}catch{}}
  async function pollQueue(){
    try{await loadTasks();_lq=Date.now();}
    catch(e){setMsg(`err:${e.message}`,5000);}
  }
  async function loadAll(){await Promise.all([pollProgress(),pollQueue()]);}

  pollQueue();pollProgress();
  setInterval(()=>{if(!document.hidden)pollProgress();},PROGRESS_MS);
  setInterval(()=>{if(!document.hidden)pollQueue();},POLL_MS);

  // Keep the pool topped to N while the dashboard is open (uses the stored PAT):
  // if N>0 and no solve run is active, dispatch one. Server-side the */5 schedule
  // does the same when the page is closed, so N workers stay alive.
  async function keepAlive(){
    const pat=getPat(); if(!pat) return;
    const N=parseInt(document.getElementById('nworkers')?.value,10)||0;
    if(N<=0) return;
    try{
      const runs=await fj(`https://api.github.com/repos/${OWNER}/${REPO}/actions/workflows/solve.yml/runs?per_page=15`);
      const active=(runs.workflow_runs||[]).filter(r=>r.status!=='completed').length;
      if(active===0 && await dispatchRun()) setMsg('↻ pool refilled',3000);
    }catch(e){}
  }
  setInterval(()=>{if(!document.hidden)keepAlive();},120000);
  keepAlive();
  document.addEventListener('visibilitychange',()=>{
    if(document.hidden)return;
    const now=Date.now();
    if(now-_initTime<30000)return;
    if((!_lp||now-_lp>90000)&&(!_lq||now-_lq>90000))loadAll();
  });

  // ── sweep section ─────────────────────────────────────────────────────────
  let _sweepLoaded=false;

  function r2cls(v){return v<0.1?'sw-r2-good':v<0.5?'sw-r2-mid':'sw-r2-high';}

  async function loadSweep(){
    const metaEl=document.getElementById('sweep-meta');
    const body=document.getElementById('sweep-body');
    metaEl.textContent='loading…';
    try{
      const data=getPat()?await apiContent('projects/REZN/overnight/deficits.json'):await fj(rawUrl('projects/REZN/overnight/deficits.json'));
      if(!data.generated_at){
        metaEl.textContent='no results yet — run ODE Sweep workflow';
        body.innerHTML='';
        return;
      }
      const gen=data.generated_at.replace('T',' ').slice(0,16);
      metaEl.textContent=`τ=${data.tau}  γ₀=${data.anchor_gamma}  ${gen}`;

      const passes=data.passes||{};
      const pnames=Object.keys(passes).sort();
      if(!pnames.length){body.innerHTML='<div class="muted" style="padding:4px">No pass data.</div>';return;}

      // sparkline SVG for best pass
      const best=passes[pnames[pnames.length-1]]||[];
      const pts=best.filter(r=>r.one_minus_R2!=null);
      let svg='';
      if(pts.length>1){
        const W=Math.min(window.innerWidth-8,500),H=50;
        const xs=pts.map(r=>r.gamma),ys=pts.map(r=>r.one_minus_R2);
        const xlo=Math.min(...xs),xhi=Math.max(...xs),ylo=Math.min(...ys),yhi=Math.max(...ys);
        const px=x=>((Math.log10(x)-Math.log10(xlo))/(Math.log10(xhi)-Math.log10(xlo)))*(W-8)+4;
        const py=y=>H-4-((y-ylo)/(yhi-ylo||1))*(H-8);
        svg=`<svg width="${W}" height="${H}" style="display:block;margin:3px 0;background:#151515;border-radius:2px">
          <polyline points="${pts.map(r=>`${px(r.gamma).toFixed(1)},${py(r.one_minus_R2).toFixed(1)}`).join(' ')}" fill="none" stroke="#3a8ef7" stroke-width="1.2"/>
          <text x="4" y="9" fill="#444" font-size="6" font-family="monospace">1-R² vs γ  pass ${esc(pnames[pnames.length-1])}</text>
        </svg>`;
      }

      body.innerHTML=svg+pnames.map(pname=>{
        const rows=passes[pname]||[];
        const ok=rows.filter(r=>r.one_minus_R2!=null);
        return`<div style="margin-top:6px">
          <div style="font-size:7.5px;font-weight:700;color:#666;padding:1px 0">pass ${esc(pname)} &nbsp;${ok.length}/${rows.length}</div>
          <table class="sw-tbl">
            <thead><tr><th>γ</th><th>1-R²</th><th>F_mp</th><th>F_f64</th></tr></thead>
            <tbody>${rows.map(r=>{
              if(r.error)return`<tr><td>${r.gamma?.toFixed(4)??'?'}</td><td colspan="3" class="err">${esc(r.error)}</td></tr>`;
              const v=r.one_minus_R2;
              return`<tr><td>${r.gamma.toFixed(4)}</td><td class="${r2cls(v)}">${v.toFixed(5)}</td><td class="muted">${r.F_mp!=null?Number(r.F_mp).toExponential(1):'—'}</td><td class="muted">${r.F_f64!=null?Number(r.F_f64).toExponential(1):'—'}</td></tr>`;
            }).join('')}</tbody>
          </table>
        </div>`;
      }).join('');
    }catch(e){
      metaEl.textContent='error loading sweep data';
      body.innerHTML=`<div style="padding:4px;font-size:8px;color:#555">${esc(String(e))}</div>`;
    }
  }

  // load sweep on page start if section is open
  window.addEventListener('DOMContentLoaded',()=>{
    if(_open.sweep){loadSweep();_sweepLoaded=true;}
  });
</script>
